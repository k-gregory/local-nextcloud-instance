- name: Capture info for the currently active user
  user:
    name: "{{ syncthing_user }}"
    state: present
  register: syncthing_user_info
  check_mode: yes

- name: Generate Syncthing config and identity
  command: syncthing generate --no-default-folder
  args:
    creates: ~/.local/state/syncthing/cert.pem

- name: Get Syncthing Device ID from CLI
  ansible.builtin.command: syncthing --device-id
  register: syncthing_id_output
  changed_when: false
  failed_when: syncthing_id_output.rc != 0    

- name: Set syncthing_device_id fact
  ansible.builtin.set_fact:
    syncthing_device_id: "{{ syncthing_id_output.stdout | trim }}"

- debug:
    msg: "dev ID: {{ syncthing_device_id }}"

- block:
    - name: Configure Syncthing Node
      include_tasks: "{{ 'configure_blackbox.yml' if is_blackbox | bool else 'configure_trusted_device.yml' }}"  
  notify: Restart Syncthing


- name: Start Syncthing user service
  systemd:
    name: syncthing
    scope: user
    state: started
    enabled: yes    
  environment:    
    XDG_RUNTIME_DIR: "/run/user/{{ syncthing_user_info.uid }}"    
